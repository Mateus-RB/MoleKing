
[build-system]
requires = [
    "setuptools>=66",
    "wheel",
    "ninja",
    "cmake>=3.12"
]
build-backend = "setuptools.build_meta"

[tool.mypy]
files = "setup.py"
python_version = "3.7"
strict = true
show_error_codes = true
enable_error_code = ["ignore-without-code", "redundant-expr", "truthy-bool"]
warn_unreachable = true

[[tool.mypy.overrides]]
module = ["ninja"]
ignore_missing_imports = true


[tool.pytest.ini_options]
minversion = "6.0"
addopts = ["-ra", "--showlocals", "--strict-markers", "--strict-config"]
xfail_strict = true
filterwarnings = ["error"]
testpaths = ["tests"]

[tool.cibuildwheel]
test-command = "pytest {project}/tests"
test-extras = ["test"]
before-build = "rm -rf {project}/build"

before-test = [
    "python -c \"import sys; print('Architecture:', '64-bit' if sys.maxsize > 2**32 else '32-bit')\"",
    "python -c \"import site, os, glob; sp = site.getsitepackages()[1]; print('Site-packages:', sp); print('All files:', os.listdir(sp)[:30]); print('PYD files:', glob.glob(sp + '/**/*.pyd', recursive=True))\"",
]

build-verbosity = 1

[tool.cibuildwheel.windows]
before-build = "if exist {project}\\build rmdir /s /q {project}\\build"

[tool.ruff]
extend-select = [
  "B",    # flake8-bugbear
  "B904",
  "I",    # isort
  "PGH",  # pygrep-hooks
  "RUF",  # Ruff-specific
  "UP",   # pyupgrade
]
extend-ignore = [
  "E501",   # Line too long
]
target-version = "py37"
