
[build-system]
requires = [
    "setuptools>=66",
    "wheel",
    "ninja",
    "cmake>=3.12"
]
build-backend = "setuptools.build_meta"

[tool.mypy]
files = "setup.py"
python_version = "3.7"
strict = true
show_error_codes = true
enable_error_code = ["ignore-without-code", "redundant-expr", "truthy-bool"]
warn_unreachable = true

[[tool.mypy.overrides]]
module = ["ninja"]
ignore_missing_imports = true


[tool.pytest.ini_options]
minversion = "6.0"
addopts = ["-ra", "--showlocals", "--strict-markers", "--strict-config"]
xfail_strict = true
filterwarnings = ["error"]
testpaths = ["tests"]


[tool.cibuildwheel]
# Configurações globais (aplicam-se a todas as plataformas)
test-command = "pytest {project}/tests"
test-extras = ["test"]
before-build = "rm -rf {project}/build"

# Debug antes dos testes para ver o que está instalado
before-test = [
    "python -c \"import sys; print('Platform:', sys.platform, 'Architecture:', sys.maxsize > 2**32)\"",
    "python -c \"import site; print('Site packages:', site.getsitepackages())\"",
    "python -c \"import os; print('Files in site-packages:'); [print(f) for root, dirs, files in os.walk(site.getsitepackages()[0]) for f in files if 'molek' in f.lower()]\"",
    "python -c \"try: import MoleKing; print('✓ MoleKing works:', MoleKing.__file__); except Exception as e: print('✗ MoleKing failed:', e)\"",
    "python -c \"try: import moleking; print('✓ moleking works:', moleking.__file__); except Exception as e: print('✗ moleking failed:', e)\"",
]

build-verbosity = 1

[tool.cibuildwheel.windows]
before-build = "if exist {project}\\build rmdir /s /q {project}\\build"

[tool.ruff]
extend-select = [
  "B",    # flake8-bugbear
  "B904",
  "I",    # isort
  "PGH",  # pygrep-hooks
  "RUF",  # Ruff-specific
  "UP",   # pyupgrade
]
extend-ignore = [
  "E501",   # Line too long
]
target-version = "py37"
