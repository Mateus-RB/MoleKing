
[build-system]
requires = [
    "setuptools>=66",
    "wheel",
    "ninja",
    "cmake>=3.12"
]
build-backend = "setuptools.build_meta"

[tool.mypy]
files = "setup.py"
python_version = "3.7"
strict = true
show_error_codes = true
enable_error_code = ["ignore-without-code", "redundant-expr", "truthy-bool"]
warn_unreachable = true

[[tool.mypy.overrides]]
module = ["ninja"]
ignore_missing_imports = true


[tool.pytest.ini_options]
minversion = "6.0"
addopts = ["-ra", "--showlocals", "--strict-markers", "--strict-config"]
xfail_strict = true
filterwarnings = ["error"]
testpaths = ["tests"]


[tool.cibuildwheel]
# Configurações globais (aplicam-se a todas as plataformas)
test-command = "pytest {project}/tests"
test-extras = ["test"]
before-build = "rm -rf {project}/build"

# Debug antes dos testes
before-test = [
    "python -c \"import sys; print('Platform:', sys.platform); print('Architecture: 64-bit' if sys.maxsize > 2**32 else 'Architecture: 32-bit')\"",
    "python -c \"import site, os; print('Site packages:', site.getsitepackages()); files = [f for s in site.getsitepackages() for root, dirs, files in os.walk(s) for f in files if 'molek' in f.lower() or f.endswith('.pyd')]; print('Relevant files:', files[:20])\"",
    "python -c \"try:\n    import MoleKing\n    print('SUCCESS: MoleKing imported from', MoleKing.__file__)\nexcept Exception as e:\n    print('FAILED MoleKing:', e)\"",
    "python -c \"try:\n    import moleking\n    print('SUCCESS: moleking imported from', moleking.__file__)\nexcept Exception as e:\n    print('FAILED moleking:', e)\"",
]

build-verbosity = 1

[tool.cibuildwheel.windows]
before-build = "if exist {project}\\build rmdir /s /q {project}\\build"

[tool.ruff]
extend-select = [
  "B",    # flake8-bugbear
  "B904",
  "I",    # isort
  "PGH",  # pygrep-hooks
  "RUF",  # Ruff-specific
  "UP",   # pyupgrade
]
extend-ignore = [
  "E501",   # Line too long
]
target-version = "py37"
