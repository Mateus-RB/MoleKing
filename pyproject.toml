
[build-system]
requires = [
    "setuptools>=66",
    "wheel",
    "ninja",
    "cmake>=3.12"
]
build-backend = "setuptools.build_meta"

[tool.mypy]
files = "setup.py"
python_version = "3.7"
strict = true
show_error_codes = true
enable_error_code = ["ignore-without-code", "redundant-expr", "truthy-bool"]
warn_unreachable = true

[[tool.mypy.overrides]]
module = ["ninja"]
ignore_missing_imports = true


[tool.pytest.ini_options]
minversion = "6.0"
addopts = ["-ra", "--showlocals", "--strict-markers", "--strict-config"]
xfail_strict = true
filterwarnings = ["error"]
testpaths = ["tests"]

[tool.cibuildwheel]
test-command = "pytest {project}/tests"
test-extras = ["test"]

before-test = [
    "python -c \"import sys; print('Python:', sys.version); print('Architecture:', '64-bit' if sys.maxsize > 2**32 else '32-bit')\"",
    "python -c \"import site; print('Site-packages:', site.getsitepackages())\"",
    "python -c \"import os, glob; print('\\nSearching for PYD files everywhere:'); [print(f) for f in glob.glob('C:/Users/runneradmin/AppData/Local/Temp/cibw-run-*/**/*.pyd', recursive=True)]\"",
    "python -c \"import sys; print('\\nSys.path:', sys.path)\"",
    "python -c \"try:\\n    import MoleKing\\n    print('SUCCESS MoleKing:', MoleKing.__file__)\\nexcept Exception as e:\\n    print('FAILED MoleKing:', e)\"",
]

build-verbosity = 1

[tool.cibuildwheel.linux]
before-build = "rm -rf {project}/build"

[tool.cibuildwheel.windows]
before-build = "if exist {project}\\build rmdir /s /q {project}\\build"

[tool.cibuildwheel.macos]
before-build = "rm -rf {project}/build"

[tool.ruff]
extend-select = [
  "B",    # flake8-bugbear
  "B904",
  "I",    # isort
  "PGH",  # pygrep-hooks
  "RUF",  # Ruff-specific
  "UP",   # pyupgrade
]
extend-ignore = [
  "E501",   # Line too long
]
target-version = "py37"
